name: Auto Update IKE TOOL
on:
  schedule:
    - cron: '30 8 * * 1-5' # 台北時間 16:30 執行
  workflow_dispatch: # 支援手動觸發

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # ★ 關鍵修正：在這裡加上 yfinance ★
        run: pip install yfinance pandas pyarrow fastparquet requests pytz numpy

      - name: Run Pipeline
        # 執行此程式會自動下載數據並建立 public 資料夾[cite: 2, 7]
        run: python run_auto_pipeline.py

      - name: Upload Website Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public/'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
